services:
  neo4j:
    image: neo4j:5
    ports:
      - "${OPENMEMORY_NEO4J_HTTP_PORT:-7474}:7474"
      - "${OPENMEMORY_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4JLABS_PLUGINS=["apoc"]
      # Disable anonymous usage data reporting to Neo4j for privacy
      # Equivalent to dbms.usage_report.enabled=false in neo4j.conf
      # https://neo4j.com/docs/operations-manual/current/configuration/configuration-settings/#config_dbms.usage_report.enabled
      - NEO4J_dbms.usage_report.enabled=false
    volumes:
      - neo4j_data:/data

  mem0_store:
    image: qdrant/qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - mem0_storage:/mem0/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER
      - API_KEY
      - NEO4J_URL=${NEO4J_URL:-neo4j://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - NEO4J_BASE_LABEL=${NEO4J_BASE_LABEL:-true}
    env_file:
      - api/.env
    depends_on:
      - mem0_store
      - neo4j
    ports:
      - "${OPENMEMORY_PORT:-8765}:8765"
    volumes:
      - ./api:/usr/src/openmemory
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    ports:
      - "${OPENMEMORY_UI_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}

volumes:
  mem0_storage:
  neo4j_data:
